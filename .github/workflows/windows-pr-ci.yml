name: Windows PR CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-pr-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Windows quality gate
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build workbench
        run: npm run build:workbench

      - name: Build desktop
        run: npm run build:desktop

      - name: Browser E2E
        run: npm run test:e2e

      - name: Desktop source smoke
        run: npm run smoke:desktop

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.sha }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
