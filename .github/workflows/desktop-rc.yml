name: Desktop RC and Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to build
        required: true
        default: nightly
        type: choice
        options:
          - nightly
          - rc

permissions:
  contents: read

concurrency:
  group: desktop-rc-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'nightly' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'nightly' }} package and evidence
    runs-on: windows-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'rc' && 'release-candidate' || 'nightly' }}
    timeout-minutes: 60
    env:
      RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'nightly' }}
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Eval routing
        id: eval-routing
        continue-on-error: true
        run: npm run eval:routing

      - name: Eval planning
        id: eval-planning
        continue-on-error: true
        run: npm run eval:planning

      - name: Eval memory
        id: eval-memory
        continue-on-error: true
        run: npm run eval:memory

      - name: Eval quality
        id: eval-quality
        continue-on-error: true
        run: npm run eval:quality

      - name: Eval recovery
        id: eval-recovery
        continue-on-error: true
        run: npm run eval:recovery

      - name: Eval security
        id: eval-security
        continue-on-error: true
        run: npm run eval:security

      - name: Eval excluded capabilities
        id: eval-excluded-capabilities
        continue-on-error: true
        run: npm run eval:excluded-capabilities

      - name: Enforce eval results
        if: ${{ steps.eval-routing.outcome == 'failure' || steps.eval-planning.outcome == 'failure' || steps.eval-memory.outcome == 'failure' || steps.eval-quality.outcome == 'failure' || steps.eval-recovery.outcome == 'failure' || steps.eval-security.outcome == 'failure' || steps.eval-excluded-capabilities.outcome == 'failure' }}
        run: exit 1

      - name: Verify RC eval dataset and sealed holdout evidence
        run: node scripts/verify-rc-eval-evidence.mjs --dataset-manifest evals/rc-dataset-manifest.json --eval-root output/evals

      - name: Build workbench
        run: npm run build:workbench

      - name: Build desktop
        run: npm run build:desktop

      - name: Browser E2E
        run: npm run test:e2e

      - name: Desktop source smoke
        run: npm run smoke:desktop

      - name: Package Windows installer
        run: npm run dist -w @xiaoshuo/desktop-shell

      - name: Verify RC signing and timestamp
        if: ${{ env.RELEASE_CHANNEL == 'rc' }}
        shell: pwsh
        run: ./apps/desktop-shell/scripts/verify-authenticode.ps1 -InstallerPath (Get-ChildItem apps/desktop-shell/release/ArcWriter-Setup-*.exe | Select-Object -First 1).FullName

      - name: Run installed-build smoke
        shell: pwsh
        run: ./apps/desktop-shell/scripts/smoke-installed-desktop.ps1 -InstallerPath (Get-ChildItem apps/desktop-shell/release/ArcWriter-Setup-*.exe | Select-Object -First 1).FullName -OutputPath artifacts/installed-smoke.json

      - name: Download previous installer for upgrade smoke
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./apps/desktop-shell/scripts/download-previous-release-installer.ps1 -Repository $env:GITHUB_REPOSITORY -ExcludeTag $env:GITHUB_REF_NAME -OutputPath artifacts/baseline/ArcWriter-Setup-baseline.exe

      - name: Run upgrade and rollback smoke
        shell: pwsh
        run: ./apps/desktop-shell/scripts/smoke-upgrade-rollback-desktop.ps1 -BaselineInstallerPath artifacts/baseline/ArcWriter-Setup-baseline.exe -CandidateInstallerPath (Get-ChildItem apps/desktop-shell/release/ArcWriter-Setup-*.exe | Select-Object -First 1).FullName -OutputPath artifacts/upgrade-rollback-smoke.json

      - name: Create release evidence
        run: node apps/desktop-shell/scripts/verify-release-evidence.mjs --artifact-dir apps/desktop-shell/release --installed-evidence artifacts/installed-smoke.json --upgrade-rollback-evidence artifacts/upgrade-rollback-smoke.json --channel $env:RELEASE_CHANNEL --out artifacts/release-evidence.json

      - name: Upload installer and immutable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arcwriter-${{ env.RELEASE_CHANNEL }}-${{ github.sha }}
          path: |
            apps/desktop-shell/release/ArcWriter-Setup-*.exe
            apps/desktop-shell/release/ArcWriter-Setup-*.exe.blockmap
            apps/desktop-shell/release/latest.yml
            artifacts/installed-smoke.json
            artifacts/upgrade-rollback-smoke.json
            artifacts/release-evidence.json
            evals/rc-dataset-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload eval manifests and redacted failure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-evidence-${{ env.RELEASE_CHANNEL }}-${{ github.sha }}
          path: output/evals
          if-no-files-found: warn
          retention-days: 30
